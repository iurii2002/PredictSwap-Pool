[profile.default]
src = "src"
out = "out"
libs = ["lib"]
forge = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"

[profile.default.fmt]
line_length = 120
tab_width = 4
bracket_spacing = false

[rpc_endpoints]
polygon = "${POLYGON_RPC_URL}"
bsc = "${BSC_RPC_URL}"
polygon_testnet = "${POLYGON_TESTNET_RPC_URL}"
bsc_testnet = "${BSC_TESTNET_RPC_URL}"

[etherscan]
polygon = { key = "${POLYGONSCAN_API_KEY}" }
bsc = { key = "${BSCSCAN_API_KEY}" }

